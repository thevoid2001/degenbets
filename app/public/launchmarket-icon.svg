<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="trailGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="iconGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect x="20" y="20" width="160" height="160" rx="32" fill="url(#iconBg)" filter="url(#iconGlow)"/>
  <!-- L shape (geometric, bold) -->
  <path d="M 58 48 L 80 48 L 80 130 L 142 130 L 142 152 L 58 152 Z" fill="#ffffff"/>
  <!-- Rocket trail swooping from top of L upward-right -->
  <path d="M 82 52 C 105 22, 138 18, 162 28" stroke="url(#trailGrad)" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 80 58 C 100 35, 128 28, 150 34" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.35"/>
  <!-- Exhaust sparkles -->
  <circle cx="162" cy="28" r="5" fill="#ffffff" opacity="0.9"/>
  <circle cx="153" cy="24" r="2.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="146" cy="22" r="1.5" fill="#ffffff" opacity="0.3"/>
</svg>
